name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ZebraLabelPrinter-linux
            exe: dist/ZebraLabelPrinter
          - os: windows-latest
            artifact: ZebraLabelPrinter-windows
            exe: dist/ZebraLabelPrinter.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pywin32 (Windows only)
        if: runner.os == 'Windows'
        run: pip install pywin32

      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Build executable
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.exe }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: ZebraLabelPrinter-linux
          path: artifacts/linux

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ZebraLabelPrinter-windows
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/ZebraLabelPrinter
            artifacts/windows/ZebraLabelPrinter.exe
