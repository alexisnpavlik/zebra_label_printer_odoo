name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: LabelPrinters-linux
            paths: |
              app_zebra/dist/ZebraLabelPrinter
              app_brother/dist/BrotherQL800LabelPrinter
          - os: windows-latest
            artifact: LabelPrinters-windows
            paths: |
              app_zebra/dist/ZebraLabelPrinter.exe
              app_brother/dist/BrotherQL800LabelPrinter.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pywin32 (Windows only)
        if: runner.os == 'Windows'
        run: pip install pywin32

      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Build Zebra executable
        run: |
          cd app_zebra
          python build.py

      - name: Build Brother executable
        run: |
          cd app_brother
          python build.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: LabelPrinters-linux
          path: artifacts/linux

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: LabelPrinters-windows
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/ZebraLabelPrinter
            artifacts/linux/BrotherQL800LabelPrinter
            artifacts/windows/ZebraLabelPrinter.exe
            artifacts/windows/BrotherQL800LabelPrinter.exe

